<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Uninstall</title></head>
<body style="font-family: -apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial; padding: 24px; max-width: 800px; margin: auto;">
  <h1>Uninstall Kenoki</h1>
  <ol>
    <li>Quit Kenoki.</li>
    <li>Drag Kenoki from Applications to the Trash.</li>
    <li>Optional: remove <code>~/Documents/Kenoki</code> to delete your projects.</li>
  </ol>
</body></html>
